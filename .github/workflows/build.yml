name: Build EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build with PyInstaller
        run: pyinstaller --onefile --windowed --hidden-import pystray --hidden-import pystray._win32 --hidden-import PIL --hidden-import PIL._tkinter_finder --hidden-import win32api --hidden-import win32gui --hidden-import win32con --collect-all pystray --collect-all PIL --name "RetireProgress" retire_tray.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: retire-progress-windows
          path: dist/RetireProgress.exe
